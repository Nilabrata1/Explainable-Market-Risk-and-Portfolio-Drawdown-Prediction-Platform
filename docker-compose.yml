services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  streamlit:
    build: .
    command: streamlit run streamlit_app/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

  mlflow:
    build: .
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /app/mlruns
    ports:
      - "5000:5000"
    volumes:
      - .:/app
